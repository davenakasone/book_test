# Render the book on every push: proves a clean-machine RENDER, validates the
# EPUB (Java on the runner, so epubcheck runs), and publishes PDF/EPUB as a
# downloadable artifact per commit. Tag a vN.N.N release to attach the built
# files to a permanent GitHub Release (see the release job).
#
# Note: this exercises the *render* off committed figures. The figure-gen
# scripts (make_figures.py / build_tikz.py) get their own job below so a
# stale committed figure or a rotted TinyTeX/matplotlib path is caught too.
name: build-book

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.9.38          # pinned to match requirements.txt
          tinytex: true

      - uses: actions/setup-java@v4   # epubcheck's JAR needs Java; declare it
        with:
          distribution: temurin
          java-version: '17'

      - name: Render book (all formats)
        working-directory: book
        run: quarto render

      - name: Validate EPUB (epubcheck)
        run: |
          python -m pip install "epubcheck==5.1.0"
          epubcheck book/_book/The-Starlight-Engine.epub

      - uses: actions/upload-artifact@v4
        with:
          name: the-starlight-engine
          path: |
            book/_book/The-Starlight-Engine.pdf
            book/_book/The-Starlight-Engine.epub
          retention-days: 30

  # Figures + TikZ + shootout are NOT covered by the render job (it uses
  # committed outputs). Run them so an unpinned-dep rot or a stale committed
  # figure fails CI instead of surprising the friend.
  figures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.9.38
          tinytex: true
      - run: python -m pip install -r requirements.txt
      - name: Regenerate figures and fail on drift
        run: |
          python scripts/make_figures.py
          python scripts/build_tikz.py
          git diff --exit-code book/figures || {
            echo "::error::committed figures are stale — run scripts and commit"; exit 1; }
      - name: Memoir shootout still compiles
        run: python latex-shootout/build.py

  # On a version tag, attach the built book to a permanent GitHub Release.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: render
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.9.38
          tinytex: true
      - working-directory: book
        run: quarto render --to pdf --to epub
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            book/_book/The-Starlight-Engine.pdf
            book/_book/The-Starlight-Engine.epub
