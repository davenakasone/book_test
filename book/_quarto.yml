project:
  type: book
  output-dir: _book
  post-render: postrender-fix-epub.py

lang: en

book:
  title: "The Starlight Engine"
  subtitle: "How the Ancients Wired the Earth"
  author: "Dr. Chocolate Daddy, PhD (pending), MD, DDS, PPM, …"
  date: "2026-07-02"
  cover-image: figures/cover.png
  chapters:
    - index.qmd
    - frontmatter/foreword.qmd
    - part: "Stone Machines"
      chapters:
        - chapters/ch01-giza.qmd
        - chapters/ch02-puma-punku.qmd
        - chapters/ch03-stonehenge.qmd
    - part: "Sky Networks"
      chapters:
        - chapters/ch04-nazca.qmd
        - chapters/ch05-ley-grid.qmd
        - chapters/ch06-antikythera.qmd
    - part: "The Warning System"
      chapters:
        - chapters/ch07-gobekli-tepe.qmd
        - chapters/ch08-long-count.qmd
        - chapters/ch09-great-wall.qmd
    - part: "The Underlying Code"
      chapters:
        - chapters/ch10-census.qmd
        - chapters/ch11-vortex-math.qmd
        - chapters/ch12-riemann.qmd
        - chapters/ch13-dark-ledger.qmd
    - part: "The First Graduation"
      chapters:
        - chapters/ch14-instructor.qmd
        - chapters/ch15-commencement.qmd
    - part: "The Terms of Service"
      chapters:
        - chapters/ch16-measurement.qmd
        - chapters/ch17-heat-bill.qmd
        - chapters/ch18-goedel.qmd
    - part: "Synthesis"
      chapters:
        - chapters/ch19-starlight-engine.qmd
        - chapters/ch20-conclusion-fermi.qmd
        - chapters/ch21-rebuilding-the-manual.qmd
  appendices:
    - appendices/a-forbidden-equations.qmd
    - appendices/b-alignment-tables.qmd
    - appendices/c-glossary.qmd

bibliography: references.bib

format:
  html:
    theme: cosmo
    toc: true
    include-after-body: html/newsletter.html
  epub:
    epub-metadata: epub-metadata.xml
    rights: >
      © 2026. A work of satirical fiction produced as a publishing-pipeline
      test. Every factual claim herein is false, including several of the
      page numbers.
  pdf:
    documentclass: scrbook
    keep-tex: true
    fontsize: 11pt
    colorlinks: true
    geometry:
      - paperwidth=6in
      - paperheight=9in
      - inner=0.75in
      - outer=0.5in
      - top=0.6in
      - bottom=0.75in
      - heightrounded
    include-in-header: latex/preamble.tex
    include-after-body: latex/after-body.tex
